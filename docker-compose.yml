services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskbot
      POSTGRES_PASSWORD: taskbot_secret
      POSTGRES_DB: taskbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskbot -d taskbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgresql://taskbot:taskbot_secret@db:5432/taskbot
      GROQ_API_KEY: ${GROQ_API_KEY}
    command: >
      sh -c "pnpm exec prisma db push --accept-data-loss && pnpm start"

volumes:
  pgdata:
